name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Earthly
        uses: earthly/actions-setup@v1

      - name: Run all checks
        run: earthly +ci
